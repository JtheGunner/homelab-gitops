# ⚠️ PLACEHOLDER – ENCRYPT WITH SOPS BEFORE COMMITTING!
#
# Bundled MariaDB credentials for the '__NAME__' website.
# `just new-website ... mariadb` pre-fills strong random passwords here.
# Consumed by BOTH the mariadb container (envFrom) and the app (db-patch.yaml),
# so this Secret is the single source of truth.
#
# Review, then encrypt in place before committing:
#   sops --encrypt --in-place db-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: __NAME__-db
  namespace: webhosting
type: Opaque
stringData:
  # The mariadb image bootstraps the DB + user from these on first start.
  MARIADB_DATABASE: __NAME__
  MARIADB_USER: __NAME__
  MARIADB_PASSWORD: __DB_PASSWORD__
  MARIADB_ROOT_PASSWORD: __DB_ROOT_PASSWORD__