# ⚠️ PLACEHOLDER – ENCRYPT WITH SOPS BEFORE COMMITTING!
#
# Git read credential so kpack can clone PRIVATE GitHub repos.
# Token: fine-grained PAT with "Contents: read" on the app repos.
# The kpack.io/git annotation tells kpack which git host this credential is for.
#   username = your GitHub username   |   password = the Contents:read PAT
apiVersion: v1
kind: Secret
metadata:
    name: github-git
    namespace: webhosting
    annotations:
        kpack.io/git: https://github.com
type: kubernetes.io/basic-auth
stringData:
    username: [USERNAME]
    password: [PASSWORD]
