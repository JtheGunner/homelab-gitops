apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: demo
  namespace: webhosting
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    # Private ghcr package: the kubelet needs the pull secret to pull the image.
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/you/demo
              # Flux ImageUpdateAutomation writes the latest tag here:
              tag: latest # {"$imagepolicy": "webhosting:demo:tag"}
            env:
              # The Paketo web server (and most apps) listen on $PORT -> = service.port.
              PORT: "8080"
            probes:
              liveness:  { enabled: true }
              readiness: { enabled: true }
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    ingress:
      main:
        enabled: true
        className: traefik
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
        hosts:
          - host: demo.home.example.com
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: main
                  port: http
        # tls:
        #   - hosts: [demo.home.example.com]
        #     secretName: demo-tls
