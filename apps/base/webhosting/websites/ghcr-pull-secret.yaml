# ⚠️ PLACEHOLDER – ENCRYPT WITH SOPS BEFORE COMMITTING!
#
# Fields:
#   username = your GitHub username (e.g. JtheGunner)
#   password = the access token (PAT)
#
# Tokens (private packages):
#   ghcr-push : CLASSIC PAT with "read:packages" + "write:packages"
#   ghcr-pull : fine-grained PAT "Packages: read"
#
# Fill in the values below, then encrypt:
#   sops --encrypt --in-place ghcr-pull-secret.yaml
#
# Alternative without hand-editing (kubectl builds the 'auth' field for you):
#   kubectl create secret docker-registry ghcr-pull -n webhosting \
#     --docker-server=ghcr.io --docker-username=<you> --docker-password=$GHCR_PULL_PAT \
#     --dry-run=client -o yaml | sops --encrypt /dev/stdin > ghcr-pull-secret.yaml
apiVersion: v1
kind: Secret
metadata:
    name: ghcr-pull
    namespace: webhosting
type: kubernetes.io/dockerconfigjson
stringData:
    .dockerconfigjson: |
        {"auths":{"ghcr.io":{"username":"[USERNAME]","password":"[PASSWORD]","auth":"[WILL_BE_GENERATED]"}}}
