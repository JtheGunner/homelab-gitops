# ServiceAccount used by kpack to push built images and to clone private source repos.
# References the ghcr-push (registry) and github-git (basic-auth) secrets; the
# ClusterBuilder also points its serviceAccountRef here (namespace: webhosting).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kpack-ghcr-push
  namespace: webhosting
secrets:
  - name: ghcr-push
  - name: github-git
imagePullSecrets:
  - name: ghcr-push
